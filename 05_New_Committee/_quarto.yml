project:
  type: book
  output-dir: _book

book:
  title: "Student Perceptions of Learning Experience: Rationale and Broad Principles of Design"
  author: "A Report by the Ad Hoc Committee on Student Perceptions of Teaching Effectiveness"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - Executive_Summary.qmd
    - Ch1_Introduction.qmd
    - Ch2_SPLE.qmd
    - Ch3_Questionnaire_Design.qmd
    - Appendices_Scoring_and_Reporting.qmd
    - Implementation_Best_Practices.qmd
    - Conclusions.qmd
    - References.qmd
  appendices:
    - Sample_Survey_Instrument.qmd

format:
  html:
    theme: cosmo
    toc-depth: 3
    number-sections: true
    fontsize: 1.05em
    linestretch: 1.4
    mainfont: "Palatino, Georgia, serif"
  pdf:
    documentclass: report
    papersize: letter
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1.25in
    fontsize: 11pt
    mainfont: "TeX Gyre Pagella"
    sansfont: "TeX Gyre Heros"
    linestretch: 1.15
    number-sections: true
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
    include-in-header:
      text: |
        \usepackage{xcolor}
        \usepackage{titlesec}
        \pagenumbering{roman}
        \titleformat{\section}{\Large\bfseries\sffamily}{\thesection}{1em}{}
        \titleformat{\subsection}{\large\bfseries\sffamily}{\thesubsection}{1em}{}
        \titlespacing*{\section}{0pt}{1.5em}{0.75em}
        \titlespacing*{\subsection}{0pt}{1.25em}{0.5em}
        \makeatletter
        \renewcommand{\maketitle}{%
          \begin{titlepage}
            \centering
            \vspace*{3cm}
            {\LARGE\bfseries Student Perceptions of Learning Experience \par}
            \vspace{0.5em}
            {\large Rationale and Broad Principles of Design \par}
            \vspace{2em}
            {\large A Report \par}
            \vspace{0.3em}
            {\large by \par}
            \vspace{0.3em}
            {\large the Ad Hoc Committee on \par}
            \vspace{0.3em}
            {\large Student Perceptions of Teaching Effectiveness \par}
            \vspace{2em}
            {\large \@date \par}
          \end{titlepage}
        }
        \makeatother
